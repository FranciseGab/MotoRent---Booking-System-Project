<!-- ── LOGIN CARD ── -->
<div class="login-wrapper">
  <div class="login-container">

    <div class="card-top-bar"></div>

    <div class="card-body">

      <div class="login-logo">
        <span class="logo-emoji">🏍</span>
        <span class="logo-text">Motor<span class="logo-accent">Rent</span></span>
      </div>

      <h2 class="login-title">Welcome Back</h2>
      <p class="login-subtitle">Sign in to manage your rentals</p>
      <div class="form-divider"></div>

      <form #loginForm="ngForm" (ngSubmit)="onSubmit(loginForm)">

        <div class="form-group">
          <label class="form-label">Email</label>
          <div class="input-wrap">
            <span class="input-icon">
              <svg viewBox="0 0 16 16" fill="none" width="15" height="15">
                <rect x="1" y="3" width="14" height="10" rx="2" stroke="currentColor" stroke-width="1.4"/>
                <path d="M1 5.5l7 4.5 7-4.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
              </svg>
            </span>
            <input
              type="email"
              class="form-input"
              placeholder="you@example.com"
              [(ngModel)]="email"
              name="email"
              required />
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Password</label>
          <div class="input-wrap">
            <span class="input-icon">
              <svg viewBox="0 0 16 16" fill="none" width="15" height="15">
                <rect x="3" y="7" width="10" height="7" rx="1.5" stroke="currentColor" stroke-width="1.4"/>
                <path d="M5 7V5a3 3 0 0 1 6 0v2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
                <circle cx="8" cy="10.5" r="1" fill="currentColor"/>
              </svg>
            </span>
            <input
              type="password"
              class="form-input"
              placeholder="••••••••"
              [(ngModel)]="password"
              name="password"
              required />
          </div>
        </div>

        <button type="submit" class="login-btn" [disabled]="loginForm.invalid">
          Login
        </button>

        <p class="signup-prompt">
          Don't have an account? <a routerLink="/signup" class="signup-link">Sign up</a>
        </p>

      </form>

      <p class="error" *ngIf="error">{{ error }}</p>

    </div>

    <div class="card-footer">
      <div class="footer-dot"></div>
      <span>MotorRent © 2025</span>
      <div class="footer-dot"></div>
    </div>

  </div>
</div>
